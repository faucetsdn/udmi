<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantis Debugger Tool</title>

  <!-- Fonts & Material Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="../shared/theme.css?v=1.4">
  <link rel="stylesheet" href="style.css?v=1.4">
</head>

<body>

  <!-- Mantis Tool Layout -->
  <div class="tool-layout">

    <!-- Local Header Toolbar (Specialized controls) -->
    <header class="local-toolbar">
      <div class="toolbar-left">
        <!-- Device Select -->
        <div class="control-group">
          <label for="device-select" class="control-label">Device</label>
          <select id="device-select" class="form-select" style="width: 160px;" aria-label="Select Device" disabled>
            <option value="">-- Enter site path --</option>
          </select>
        </div>

        <!-- Debug Scenario Selector -->
        <div class="control-group">
          <label for="scenario-select" class="control-label">Debug Scenario</label>
          <select id="scenario-select" class="form-select" style="width: 280px;" aria-label="Select Scenario" disabled>
            <option value="">-- Waiting for parent selection --</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Main Workspace Grid -->
    <main class="tool-main">
      <div class="mantis-layout">

        <!-- Left Pane: State Transition Graph/Tree -->
        <div class="card mantis-tree-card">
          <div class="card-header">
            <h3>Debug Sequence Flow</h3>
            <span class="badge badge-info">Active Stream</span>
          </div>
          <div class="mantis-tree-container">
            <!-- Dynamically populated transitions flow -->
          </div>
        </div>

        <!-- Right Pane: MQTT Payload Inspector -->
        <div class="card mantis-inspector-card">
          <div class="card-header border-bottom">
            <div class="inspector-title-bar">
              <span class="material-symbols-outlined">topic</span>
              <span id="mqtt-topic" class="topic-name">Select a state node to inspect MQTT payload</span>
            </div>
            <button id="btn-copy-payload" class="btn btn-outlined btn-icon" disabled
              aria-label="Copy payload to clipboard">
              <span class="material-symbols-outlined">content_copy</span>
            </button>
          </div>
          <div class="inspector-body">
            <div id="mqtt-json-viewer" style="height: 100%;"></div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- JavaScript Modules -->
  <script type="module" src="main.js"></script>
</body>

</html>
