<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UDMI Workbench</title>
  <link rel="icon" type="image/png" href="/assets/udmi_logo.png">

  <!-- Fonts & Material Icons (Google Testrun Aligned) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="shared/theme.css?v=1.4">
  <link rel="stylesheet" href="style.css?v=1.4">
</head>

<body>

  <!-- Application Loading Overlay -->
  <div id="app-loader" class="app-loader-overlay">
    <div class="loader-content">
      <img src="/assets/udmi_logo.png" alt="UDMI Logo" class="loader-logo" />
      <div class="loader-track">
        <div class="loader"></div>
      </div>
      <div class="loader-text">Loading UDMI Workbench...</div>
    </div>
  </div>

  <!-- Main App Shell -->
  <div class="app-shell">

    <!-- Top Toolbar (Global Shared Controls Only) -->
    <header class="app-toolbar">
      <div class="toolbar-brand">
        <img src="/assets/udmi_logo.png" alt="UDMI Logo" class="brand-logo-img" />
        <div class="brand-text-group">
          <h1 class="brand-title">Workbench</h1>
          <span id="app-subtitle" class="brand-subtitle">/ Workspace</span>
        </div>
      </div>

      <div class="toolbar-controls">
        <!-- Global Shared Control: Site Model Path Input -->
        <div class="control-group">
          <label for="site-input" class="control-label">Site Model Path</label>
          <div class="input-with-button">
            <input type="text" id="site-input" class="form-input" style="width: 280px;"
              placeholder="e.g. sites/udmi_site_model" aria-label="Site Model Path" />
            <button id="btn-browse-site" class="btn btn-outlined btn-icon-sm" aria-label="Browse site model folder">
              <span class="material-symbols-outlined">folder_open</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- App Body -->
    <main class="app-main">

      <!-- Navigation Sidebar (Only visible if > 1 feature active) -->
      <aside class="app-sidebar">
        <nav class="sidebar-tabs" aria-label="Main Navigation">
          <button class="sidebar-tab active" data-tab="sequencer" data-feature="sequencer" aria-selected="true" role="tab">
            <span class="material-symbols-outlined">analytics</span>
            <span>Sequencer</span>
          </button>
          <button class="sidebar-tab" data-tab="mantis" data-feature="mantis" aria-selected="false" role="tab">
            <span class="material-symbols-outlined">bug_report</span>
            <span>Mantis</span>
          </button>
        </nav>
      </aside>

      <!-- Workspace Panel Content (Micro-Frontend Iframe Containers) -->
      <section class="app-content" style="width: 100%; height: 100%; overflow: hidden; padding: 0; position: relative;">
        <!-- Sequencer Iframe -->
        <iframe id="iframe-sequencer" class="app-iframe active" src="sequencer/index.html" data-feature="sequencer"></iframe>
        <!-- Mantis Iframe -->
        <iframe id="iframe-mantis" class="app-iframe" src="mantis/index.html" data-feature="mantis"></iframe>
      </section>
    </main>

  </div>

  <!-- Inline Folder Browser Modal (Managed by parent and shared globally) -->
  <div id="folder-browser-modal" class="modal-overlay">
    <div class="modal-card glass-panel">
      <div class="modal-header">
        <h3>Browse Site Model Directory</h3>
        <button id="btn-close-browser" class="btn-close" aria-label="Close folder browser">&times;</button>
      </div>
      <div class="modal-body">
        <div class="browser-path-bar">
          <button id="btn-browser-up" class="btn btn-outlined btn-icon-sm" aria-label="Go to parent directory">
            <span class="material-symbols-outlined">arrow_upward</span>
          </button>
          <input type="text" id="browser-current-path" class="form-input flex-1" aria-label="Current path" />
        </div>
        <div class="browser-list" aria-label="Directory list">
          <!-- Populated dynamically with subdirectories -->
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-browser-cancel" class="btn btn-outlined">Cancel</button>
        <button id="btn-browser-select" class="btn btn-primary">Select Directory</button>
      </div>
    </div>
  </div>

  <!-- JavaScript Shell Module -->
  <script type="module" src="main.js"></script>
</body>

</html>
